<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slides</title>
  <style id="marp-style"></style>
  <style>
    :root {
      --ai-accent: #67c7ff;
      --bg-primary: var(--color-background, #0a0e1a);
      --text-primary: var(--color-text, #e5e5e5);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #marp-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #marp-container section {
      display: none;
      flex-shrink: 0;
      width: 100%;
      height: 100%;
    }

    #marp-container section.active {
      display: block;
    }

    /* ── Slide Transitions ── */

    .transition-forward section.active {
      animation: slide-from-right 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .transition-backward section.active {
      animation: slide-from-left 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .transition-fade section.active {
      animation: fade-scale-in 0.4s ease-out both;
    }

    @keyframes slide-from-right {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes slide-from-left {
      from { opacity: 0; transform: translateX(-60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fade-scale-in {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Controls ── */

    .controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding: 14px 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    body:hover .controls,
    .controls:focus-within {
      opacity: 1;
    }

    .controls button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #e5e5e5;
      cursor: pointer;
      font-size: 16px;
      padding: 8px 18px;
      border-radius: 8px;
      transition: background 0.15s, transform 0.15s;
    }

    .controls button:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    .controls button:disabled {
      opacity: 0.3;
      cursor: default;
      transform: none;
    }

    .progress {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    /* ── Title Bar ── */

    .title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 10px 20px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    body:hover .title-bar {
      opacity: 1;
    }

    .ai-pulse {
      width: 6px;
      height: 6px;
      background: var(--ai-accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(103, 199, 255, 0.5); }
      70% { box-shadow: 0 0 0 8px rgba(103, 199, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(103, 199, 255, 0); }
    }

    /* ── Fullscreen ── */

    body:fullscreen .controls,
    body:fullscreen .title-bar {
      opacity: 0;
    }

    body:fullscreen:hover .controls,
    body:fullscreen:hover .title-bar {
      opacity: 1;
    }

    /* ── Reduced Motion ── */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <div class="ai-pulse"></div>
    <span id="deck-name">Slides</span>
  </div>

  <div id="marp-container"></div>

  <div class="controls">
    <button id="prev-btn" disabled>◀</button>
    <span class="progress" id="progress">0 / 0</span>
    <button id="next-btn" disabled>▶</button>
    <button id="fs-btn" title="Fullscreen (F)">⛶</button>
  </div>

  <script>
    const slidesApp = window["slides"];
    let currentIdx = 0;
    let totalSlides = 0;
    let prevIdx = -1;

    function updateSlide(direction) {
      const container = document.getElementById("marp-container");
      const sections = container.querySelectorAll("section");

      // Remove old transition classes
      container.classList.remove("transition-forward", "transition-backward", "transition-fade");

      // Determine transition
      if (prevIdx >= 0 && prevIdx !== currentIdx) {
        container.classList.add(currentIdx > prevIdx ? "transition-forward" : "transition-backward");
      } else if (direction === "fade") {
        container.classList.add("transition-fade");
      }

      sections.forEach((s, i) => {
        s.classList.toggle("active", i === currentIdx);
      });

      prevIdx = currentIdx;
      document.getElementById("progress").textContent = `${currentIdx + 1} / ${totalSlides}`;
      document.getElementById("prev-btn").disabled = currentIdx === 0;
      document.getElementById("next-btn").disabled = currentIdx === totalSlides - 1;
    }

    function parseMCP(raw) {
      if (raw && raw.content && Array.isArray(raw.content)) {
        const item = raw.content.find(c => c.type === "text" && c.text);
        if (item) {
          try { return JSON.parse(item.text); } catch { return item.text; }
        }
      }
      return raw;
    }

    function handleRender(data) {
      document.getElementById("marp-container").innerHTML = data.html || "";
      document.getElementById("marp-style").innerHTML = data.css || "";
      totalSlides = data.total || 0;
      currentIdx = data.current || 0;
      prevIdx = -1;
      updateSlide("fade");
    }

    function handleData(data) {
      if (!data) return;
      if (data.type === "render" || (data.html && data.css)) {
        handleRender(data);
      } else if (data.type === "nav" || typeof data.index === "number") {
        const oldIdx = currentIdx;
        currentIdx = data.index;
        prevIdx = oldIdx;
        updateSlide();
      }
    }

    // ── Event Handlers ──

    document.getElementById("prev-btn").addEventListener("click", async () => {
      if (slidesApp) {
        const result = parseMCP(await slidesApp.previous());
        handleData(result);
      } else if (currentIdx > 0) {
        prevIdx = currentIdx;
        currentIdx--;
        updateSlide();
      }
    });

    document.getElementById("next-btn").addEventListener("click", async () => {
      if (slidesApp) {
        const result = parseMCP(await slidesApp.next());
        handleData(result);
      } else if (currentIdx < totalSlides - 1) {
        prevIdx = currentIdx;
        currentIdx++;
        updateSlide();
      }
    });

    document.getElementById("fs-btn").addEventListener("click", () => {
      if (document.fullscreenElement) {
        document.exitFullscreen();
      } else {
        document.body.requestFullscreen();
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
        e.preventDefault();
        document.getElementById("next-btn").click();
      }
      if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault();
        document.getElementById("prev-btn").click();
      }
      if (e.key === "f" || e.key === "F") {
        document.getElementById("fs-btn").click();
      }
      if (e.key === "Home") {
        if (slidesApp) slidesApp.go({ index: 0 }).then(r => handleData(parseMCP(r)));
      }
      if (e.key === "End") {
        if (slidesApp) slidesApp.go({ index: totalSlides - 1 }).then(r => handleData(parseMCP(r)));
      }
    });

    // ── Bridge Setup ──

    if (slidesApp) {
      window.photon?.onResult?.((result) => {
        handleData(parseMCP(result));
      });

      window.photon?.onEmit?.((event) => {
        const name = event?.event;
        if (name === "slideChanged" || name === "deckChanged") {
          // Re-fetch full state
          slidesApp.main().then(r => handleData(parseMCP(r)));
        }
      });

      // Initial load
      slidesApp.main().then(r => handleData(parseMCP(r)));
    }
  </script>
</body>
</html>
