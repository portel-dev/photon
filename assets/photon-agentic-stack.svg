<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Photon agentic stack</title>
  <desc id="desc">A layered infographic showing Photon as a stack: intent, derived contracts, surfaces, runtime operations, trust, and composition.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF7F5"/>
    </linearGradient>
    <linearGradient id="intent" x1="210" y1="120" x2="990" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5D5FEF"/>
      <stop offset="1" stop-color="#10A7A7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#10294A" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif}
      .mono{font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace}
      .title{font-weight:850;fill:#0A2348}
      .body{fill:#2F4768}
      .muted{fill:#637B99}
      .label{font-size:15px;font-weight:850;letter-spacing:1.4px;fill:#627B99}
      .layerTitle{font-size:25px;font-weight:850;fill:#0A2348}
      .small{font-size:18px;fill:#304A6B}
      .pill{font-size:17px;font-weight:800;fill:#0A2348}
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#canvas)"/>

  <text x="60" y="70" class="font title" font-size="48">Photon as a stack</text>
  <text x="60" y="104" class="font body" font-size="20">A photon is not just an MCP app. It is a small verified capability that gains interfaces, operations,</text>
  <text x="60" y="132" class="font body" font-size="20">and trust boundaries from one definition.</text>

  <g filter="url(#shadow)">
    <rect x="210" y="146" width="780" height="82" rx="24" fill="url(#intent)"/>
    <text x="248" y="180" class="font label" fill="#DFFBFF">SOURCE OF TRUTH</text>
    <text x="248" y="212" class="mono" font-size="24" fill="#FFFFFF">weather.photon.ts  ->  async current({ city })</text>
    <text x="903" y="198" text-anchor="middle" class="font" font-size="21" font-weight="850" fill="#EAFBFF">intent</text>
  </g>

  <g stroke="#A8BBD2" stroke-width="3" stroke-linecap="round" stroke-dasharray="7 10">
    <path d="M600 228 V258"/>
    <path d="M600 342 V386"/>
    <path d="M600 492 V536"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="258" width="960" height="84" rx="22" fill="#FFFFFF" stroke="#C8D8EF"/>
    <text x="154" y="294" class="font label">DERIVED CONTRACT</text>
    <text x="154" y="322" class="font layerTitle" font-size="24">MCP schema  +  CLI arguments  +  Beam fields  +  app resources  +  docs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="386" width="960" height="106" rx="22" fill="#FFFFFF" stroke="#BFE8DA"/>
    <text x="154" y="423" class="font label">SURFACES PEOPLE AND AGENTS TOUCH</text>
    <g>
      <rect x="154" y="444" width="128" height="32" rx="16" fill="#EAF2FF"/>
      <text x="218" y="466" text-anchor="middle" class="font pill">CLI</text>
      <rect x="302" y="444" width="128" height="32" rx="16" fill="#EAF2FF"/>
      <text x="366" y="466" text-anchor="middle" class="font pill">Beam</text>
      <rect x="450" y="444" width="128" height="32" rx="16" fill="#E9FBF6"/>
      <text x="514" y="466" text-anchor="middle" class="font pill">MCP</text>
      <rect x="598" y="444" width="156" height="32" rx="16" fill="#E9FBF6"/>
      <text x="676" y="466" text-anchor="middle" class="font pill">Chat UI</text>
      <rect x="774" y="444" width="272" height="32" rx="16" fill="#FFF4DF"/>
      <text x="910" y="466" text-anchor="middle" class="font pill">Web routes and apps</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="536" width="460" height="116" rx="22" fill="#FFFFFF" stroke="#F7D4A7"/>
    <text x="154" y="574" class="font label">OPERATIONS</text>
    <text x="154" y="606" class="font layerTitle">Runs beyond a request</text>
    <text x="154" y="636" class="font small">Schedules, webhooks, retries, locks, state, events.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="536" width="460" height="116" rx="22" fill="#FFFFFF" stroke="#C7D7F5"/>
    <text x="654" y="574" class="font label">TRUST BOUNDARY</text>
    <text x="654" y="606" class="font layerTitle">Safe by construction</text>
    <text x="654" y="636" class="font small">Types, validation, auth scopes, caller identity, audit logs.</text>
  </g>

  <g>
    <rect x="210" y="686" width="780" height="38" rx="19" fill="#E5F0FF"/>
    <text x="600" y="711" text-anchor="middle" class="font" font-size="18" fill="#284362">Composition: photons call photons, publish to marketplaces, and become reliable agent architecture.</text>
  </g>
</svg>
