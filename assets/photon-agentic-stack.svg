<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Photon agentic stack</title>
  <desc id="desc">A layered architecture infographic showing Photon as one source definition that produces contracts, surfaces, runtime operations, trust boundaries, and composition.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FAFF"/>
      <stop offset="0.55" stop-color="#F2FAF8"/>
      <stop offset="1" stop-color="#FFF8EB"/>
    </linearGradient>
    <linearGradient id="source" x1="116" y1="170" x2="1010" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4257F0"/>
      <stop offset="1" stop-color="#0AA6A6"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-25%" width="116%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12355A" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif}
      .mono{font-family:"SFMono-Regular", Consolas, "Liberation Mono", monospace}
      .title{font-weight:850;fill:#071D3A}
      .body{fill:#334B68}
      .eyebrow{font-size:15px;font-weight:850;letter-spacing:1.5px;fill:#607893}
      .layerTitle{font-size:26px;font-weight:850;fill:#071D3A}
      .layerText{font-size:19px;fill:#334B68}
      .num{font-size:17px;font-weight:850;fill:#FFFFFF}
      .code{font-size:23px;font-weight:750;fill:#FFFFFF}
      .small{font-size:18px;fill:#2D4866}
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="760" rx="34" fill="none" stroke="#D7E4F2"/>

  <text x="64" y="76" class="font title" font-size="50">Photon: the agentic stack</text>
  <text x="64" y="116" class="font body" font-size="22">One TypeScript capability becomes contracts, interfaces, operations,</text>
  <text x="64" y="145" class="font body" font-size="22">and trust boundaries for humans, agents, and production systems.</text>

  <g filter="url(#softShadow)">
    <rect x="86" y="190" width="1028" height="72" rx="14" fill="url(#source)"/>
    <text x="128" y="219" class="font eyebrow" fill="#DDFBFF">SOURCE OF TRUTH</text>
    <text x="128" y="248" class="mono code">weather.photon.ts  ->  async current({ city })</text>
    <rect x="1014" y="210" width="64" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.18"/>
    <text x="1046" y="232" text-anchor="middle" class="font" font-size="16" font-weight="850" fill="#FFFFFF">intent</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="300" width="1028" height="60" rx="8" fill="#FFFFFF" stroke="#C9D9EC"/>
    <rect x="86" y="300" width="18" height="60" rx="8" fill="#3478F6"/>
    <circle cx="145" cy="330" r="18" fill="#3478F6"/>
    <text x="145" y="337" text-anchor="middle" class="font num">1</text>
    <text x="184" y="324" class="font eyebrow">AGENT CONTRACT</text>
    <text x="184" y="348" class="font layerTitle">MCP schema + prompts + resources + app metadata</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="382" width="1028" height="60" rx="8" fill="#FFFFFF" stroke="#BDE7DF"/>
    <rect x="86" y="382" width="18" height="60" rx="8" fill="#12A594"/>
    <circle cx="145" cy="412" r="18" fill="#12A594"/>
    <text x="145" y="419" text-anchor="middle" class="font num">2</text>
    <text x="184" y="406" class="font eyebrow">HUMAN SURFACES</text>
    <text x="184" y="430" class="font layerTitle">CLI + Beam + web routes + chat UI + embedded app views</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="464" width="498" height="70" rx="8" fill="#FFFFFF" stroke="#F3CF9A"/>
    <rect x="86" y="464" width="18" height="70" rx="8" fill="#F59E0B"/>
    <circle cx="145" cy="499" r="18" fill="#F59E0B"/>
    <text x="145" y="506" text-anchor="middle" class="font num">3</text>
    <text x="184" y="493" class="font eyebrow">OPERATIONS</text>
    <text x="184" y="510" class="font layerTitle" font-size="23">Schedules + webhooks + retries</text>
    <text x="184" y="538" class="font layerText">locks, state, and audit history</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="616" y="464" width="498" height="70" rx="8" fill="#FFFFFF" stroke="#C7D7F5"/>
    <rect x="616" y="464" width="18" height="70" rx="8" fill="#6D5EF2"/>
    <circle cx="675" cy="499" r="18" fill="#6D5EF2"/>
    <text x="675" y="506" text-anchor="middle" class="font num">4</text>
    <text x="714" y="493" class="font eyebrow">TRUST BOUNDARY</text>
    <text x="714" y="510" class="font layerTitle" font-size="23">Auth + scopes + validation</text>
    <text x="714" y="538" class="font layerText">caller identity, and logs</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="574" width="1028" height="78" rx="8" fill="#071D3A"/>
    <rect x="86" y="574" width="18" height="78" rx="8" fill="#22A447"/>
    <circle cx="145" cy="613" r="18" fill="#22A447"/>
    <text x="145" y="620" text-anchor="middle" class="font num">5</text>
    <text x="184" y="606" class="font eyebrow" fill="#91A8C1">COMPOSITION</text>
    <text x="184" y="633" class="font" font-size="25" font-weight="850" fill="#FFFFFF">Photons call photons, publish to marketplaces, and form reliable agent systems</text>
  </g>

  <g>
    <rect x="820" y="92" width="294" height="64" rx="8" fill="#EAF2FF" stroke="#C7D8EF"/>
    <text x="848" y="120" class="font eyebrow">MENTAL MODEL</text>
    <text x="848" y="145" class="font small">capability x surfaces x trust</text>
  </g>

  <text x="600" y="710" text-anchor="middle" class="font" font-size="18" fill="#55708A">Small enough to verify. Useful enough to compose. Friendly enough for humans and agents.</text>
</svg>
