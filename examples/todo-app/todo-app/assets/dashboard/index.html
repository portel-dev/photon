<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>todo-app dashboard</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color-scheme: light dark;
      }
      body {
        margin: 0;
        padding: 24px;
        max-width: 640px;
        margin-inline: auto;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 16px;
      }
      form {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      input[type='text'] {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid currentColor;
        border-radius: 6px;
        font-size: 14px;
        background: transparent;
        color: inherit;
      }
      button {
        padding: 8px 16px;
        border: 1px solid currentColor;
        border-radius: 6px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        font-size: 14px;
      }
      ul {
        padding: 0;
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      li {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 8px 12px;
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 6px;
      }
      li.done {
        opacity: 0.5;
        text-decoration: line-through;
      }
      .title {
        flex: 1;
      }
      #status {
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <h1>todo-app dashboard</h1>
    <p id="status">connecting…</p>
    <form id="add-form">
      <input id="title" type="text" placeholder="Add a task" required />
      <button type="submit">Add</button>
    </form>
    <ul id="tasks"></ul>

    <script>
      // Minimal SPA: relies on the photon bridge injected by the runtime.
      // The bridge handshake decides whether window.todoApp.<method>(args)
      // routes via postMessage (host) or fetch (standalone). Our code is
      // identical in either context.
      (function () {
        const status = document.getElementById('status');
        const list = document.getElementById('tasks');
        const form = document.getElementById('add-form');
        const titleInput = document.getElementById('title');

        function render(tasks) {
          list.innerHTML = '';
          for (const t of tasks) {
            const li = document.createElement('li');
            if (t.done) li.classList.add('done');
            const title = document.createElement('span');
            title.className = 'title';
            title.textContent = t.title;
            const remove = document.createElement('button');
            remove.textContent = 'Remove';
            remove.addEventListener('click', async () => {
              await window.todoApp.removeTask({ id: t.id });
              await refresh();
            });
            li.append(title, remove);
            list.appendChild(li);
          }
        }

        async function refresh() {
          try {
            const tasks = await window.todoApp.listTasks();
            render(Array.isArray(tasks) ? tasks : []);
            status.textContent = (tasks?.length ?? 0) + ' task(s)';
          } catch (e) {
            status.textContent = 'error: ' + (e?.message ?? e);
          }
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const title = titleInput.value;
          if (!title.trim()) return;
          try {
            await window.todoApp.addTask({ title: title.trim() });
            titleInput.value = '';
            await refresh();
          } catch (err) {
            status.textContent = 'add failed: ' + (err?.message ?? err);
          }
        });

        // Re-render whenever the host (or our own update flow) tells us to.
        // photon.onResult fires after a tool/call response is broadcast.
        window.photon?.onResult?.(refresh);

        // Initial paint.
        refresh();
      })();
    </script>
  </body>
</html>
