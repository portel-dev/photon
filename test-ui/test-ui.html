<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom UI Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>✨ Hello from Custom UI!</h1>
        <p>This is rendered inside an iframe with full style isolation.</p>
        <button onclick="ping()">Ping Host</button>
        <div id="output" style="margin-top: 1rem; color: #666;"></div>
    </div>

    <script>
        function ping() {
            // Use standard photon bridge
            if (window.photon) {
                window.photon.invoke('ping', { timestamp: Date.now() })
                    .then(res => document.getElementById('output').innerText = 'Pong: ' + JSON.stringify(res))
                    .catch(err => document.getElementById('output').innerText = 'Error: ' + err);
            } else {
                document.getElementById('output').innerText = 'Bridge not found (yet)';
            }
        }
    </script>
</body>

</html>
